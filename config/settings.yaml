# OpenPROM 系统配置文件
# 版本：4.3.0
# 更新日期：2026-06-15

# ====================
# API 配置
# ====================
api:
  max_retries: 3
  retry_delay_seconds: 2.0
  timeout_seconds: 180
  
  temperature_technique: 0.3
  temperature_artistic: 0.4
  temperature_impression: 0.4
  temperature_generation: 0.7
  
  max_workers: 4
  first_api_timeout: 300
  model_timeout: 180

# ====================
# 评分权重
# ====================
scoring:
  technique_weights:
    llm_technique: 0.50
    llm_rhetoric: 0.50
  
  total_weights:
    formal: 0.30
    technique: 0.30
    artistic: 0.30
    impression: 0.10
  
  grade_thresholds:
    excellent: 90
    good: 75
    pass: 60
    fail: 0

# ====================
# 工具链 / Agent 配置
# ====================
tools:
  meter:
    match_rate_threshold: 0.85
    strict_match_rate_threshold: 0.95
  rhyme:
    book: 平水韵
    max_suggestions: 24
    # 常用韵字优先级（出现频率高）
    common_chars_weight: 1.2

generation:
  couplet:
    max_revision_rounds: 4
    default_length: 7
  shi:
    max_revision_rounds: 5
    default_form: 七律
    supported_forms: [五绝, 七绝, 五律, 七律]
  streaming:
    enabled: true
    keep_alive_comment: true

agent:
  # 当 LLM 生成未通过格律检测时，是否将 tool_result 回送以触发自修正
  enable_self_revision: true
  # 无法自动修正时是否交付“最佳尝试”
  deliver_best_effort: true

# ====================
# RAG / 知识向量层（Hermes-style memory layer）
# ====================
rag:
  enabled: true
  embedding_provider: sentence_transformers
  embedding_model: BAAI/bge-small-zh-v1.5
  embedding_device: cpu
  vector_store_dir: openprom/data/vector_store
  vector_store_collection: poetry_knowledge
  # 生成时检索多少首古人诗作作为参考
  retrieve_top_k: 3
  # 是否按体裁过滤（五律/七律/五绝/七绝）
  filter_by_form: true
  # 知识库为空时的行为：true=继续生成并提示用户；false=报错
  allow_empty_store: true

# ====================
# Hermes 检索与技能层
# ====================
hermes:
  enabled: true
  top_k: 3
  # 是否启用向量 + 关键词混合检索
  enable_hybrid: true
  # RRF 融合权重
  vector_weight: 1.0
  keyword_weight: 1.0
  rrf_k: 60
  # 索引时分块策略
  chunk_whole_poem: true
  chunk_couplets: true
  chunk_quatrains: true

# ====================
# 知识层 v2（Hermes 升格）
# ====================
knowledge:
  enabled: false                   # master switch: true = use knowledge layer pipeline
  retrieval:
    strategy: hybrid               # dense | sparse | hybrid
    top_k_recall: 20               # candidates before rerank
    top_k_final: 5                 # final results after rerank
    rerank:
      enabled: false               # M2: enable cross-encoder rerank
      provider: noop               # noop | bge-reranker-v2-m3 | bge-reranker-base
      weights:
        semantic: 0.6
        rule: 0.4
    fusion:
      method: rrf
      rrf_k: 60
  embedding:
    provider: sentence_transformers # sentence_transformers | onnx | mock
    model: BAAI/bge-small-zh-v1.5
    device: cpu
  memory:
    cache_enabled: true
    cache_ttl_seconds: 3600
  corpus:
    active_snapshot: ""
    fallback_on_empty: true

# ====================
# 特性开关
# ====================
features:
  knowledge_layer_v2: false        # true = use new knowledge/ pipeline; false = use old services/hermes
  saddle_engineering:
    enabled: true
    strict_mode: false
    max_violations: 3
  verbose_analysis:
    enabled: true
    max_char_display: 10
  special_attention:
    enabled: true

# PORM 系统配置文件
# 版本：4.2.0
# 更新日期：2026-04-24

# ====================
# API 配置
# ====================
api:
  max_retries: 3
  retry_delay_seconds: 2.0
  timeout_seconds: 180
  
  temperature_technique: 0.3
  temperature_artistic: 0.4
  temperature_impression: 0.4
  
  max_workers: 4
  first_api_timeout: 300
  model_timeout: 180

# ====================
# 评分权重
# ====================
scoring:
  technique_weights:
    llm_technique: 0.50
    llm_rhetoric: 0.50
  
  total_weights:
    formal: 0.30
    technique: 0.30
    artistic: 0.30
    impression: 0.10
  
  grade_thresholds:
    excellent: 90
    good: 75
    pass: 60
    fail: 0

# ====================
# 特性开关
# ====================
features:
  saddle_engineering:
    enabled: true
    strict_mode: false
  verbose_analysis:
    enabled: true
    max_char_display: 10
  special_attention:
    enabled: true

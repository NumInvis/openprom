version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENPROM_API_KEY=${OPENPROM_API_KEY:-}
      - OPENPROM_BASE_URL=${OPENPROM_BASE_URL:-https://your-llm-gateway.example.com/ai/v1}
      - OPENPROM_MODEL=${OPENPROM_MODEL:-Qwen3.5-9B-Instruct}
      - OPENPROM_DATABASE_URL=sqlite:///./data/openprom.db
      - OPENPROM_REDIS_URL=redis://redis:6379/0
      - OPENPROM_CACHE_ENABLED=${OPENPROM_CACHE_ENABLED:-false}
      - OPENPROM_LOG_LEVEL=${OPENPROM_LOG_LEVEL:-INFO}
      - OPENPROM_LOG_FORMAT=${OPENPROM_LOG_FORMAT:-json}
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

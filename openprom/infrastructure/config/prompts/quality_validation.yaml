name: quality_validation
prompt_type: QUALITY_VALIDATION
active_version: v1.0.0
deprecated: true
deprecation_reason: "从未被系统代码调用，马鞍工程使用规则验证替代"
versions:
  v1.0.0:
    template: "请严格验证以下对联分析结果的质量：\n\n原始对联：\n上联：{{ upper }}\n下联：{{ lower }}\n\n待验证结果：\n      {{ result_json }}\n\n验证维度：\n1. 【逻辑一致性】\n   - 评分与评价理由是否一致\n   - 各维度评分是否相互协调\n      \   - 是否存在自相矛盾之处\n\n2. 【事实准确性】\n   - 对仗分析是否符合实际\n   - 文化典故引用是否准确\n   - 字词解释是否正确      \n3. 【评价客观性】\n   - 是否存在明显偏见\n   - 评价标准是否统一\n   - 是否受到无关因素影响\n\n4. 【建议可行性】\n      \   - 改进建议是否具体可行\n   - 建议是否符合对联创作规律\n   - 建议是否具有建设性\n\n请以JSON格式返回：\n{\n    \"is_valid\": true/false,\n    \"confidence\": 置信度(0-1),\n    \"issues\": [\"问题1\", \"问题2\"],\n    \"corrections\": {\"字段名\": \"修正值\"},\n    \"final_score\": 修正后的总分\n}"
    parameters:
      required:
      - upper
      - lower
      - result_json
    metadata:
      author: openprom-system
      created_at: '2024-01-01'
      tags:
      - validation
      - quality
      - v1
